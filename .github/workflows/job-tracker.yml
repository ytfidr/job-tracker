name: Job Tracker

on:
  schedule:
    # 北京时间 09:00 和 18:00（UTC+8，对应 UTC 01:00 和 10:00）
    - cron: '0 1 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许写入仓库（更新缓存）

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Run scraper
        env:
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
          DEBUG: "true"
        run: python scraper.py

      - name: Commit cache update
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add cache/
          git diff --staged --quiet || git commit -m "chore: update job cache $(date +'%Y-%m-%d %H:%M')"
          git push
